# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: registry.redhat.io/rhoai/odh-rhel9-operator@sha256:67d8ad67bef9ce7d06f66a0a3fc054052962f1e59c96629ecadc6790f319f1d1 # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Related images env vars (RELATED_IMAGE_*)
  relatedImages:
    - name: RELATED_IMAGE_ODH_MAAS_API_IMAGE
      value: registry.redhat.io/rhoai/odh-maas-api-rhel9@sha256:4688044ef66cc27ca34e595d19da5d94d330ed27c6d7953887e3834694dcce20
    - name: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE
      value: registry.redhat.io/rhoai/odh-kserve-controller-rhel9@sha256:4f630af88329826cdfb7faddd3d8a75a019fe971f9c027f4720a94a52f0638f9
    - name: RELATED_IMAGE_ODH_KSERVE_LLMISVC_CONTROLLER_IMAGE
      value: registry.redhat.io/rhoai/odh-kserve-llmisvc-controller-rhel9@sha256:19ab9bef5b38b0d97a84361b4bc80b9ba30b42d85cd96cd78e60d4922ead3ef8
    - name: RELATED_IMAGE_ODH_KSERVE_ROUTER_IMAGE
      value: registry.redhat.io/rhoai/odh-kserve-router-rhel9@sha256:706392ecb4f3c389ca1ce0ec87640ed6745bc176246c1edf3963e1c0357e284a
    - name: RELATED_IMAGE_ODH_KSERVE_STORAGE_INITIALIZER_IMAGE
      value: registry.redhat.io/rhoai/odh-kserve-storage-initializer-rhel9@sha256:eb925c1a0c46fbbda626688c576dc2d4f958d0b7a128132cb8e8c30ec5442df8
    - name: RELATED_IMAGE_RHAIIS_VLLM_CUDA_IMAGE
      value: registry.redhat.io/rhaii-early-access/vllm-cuda-rhel9@sha256:abf0fd7398a18c47a754218b0cbd76ea300b0c6da5fb8d801db8c165df5022ca
    - name: RELATED_IMAGE_RHAIIS_VLLM_ROCM_IMAGE
      value: registry.redhat.io/rhaii-early-access/vllm-rocm-rhel9@sha256:6c566f161c3102942855cdbef6e10580b8dc61f61bc85b5206d7b5e67bfadef0
    - name: RELATED_IMAGE_ODH_LLM_D_INFERENCE_SCHEDULER_IMAGE
      value: registry.redhat.io/rhoai/odh-llm-d-inference-scheduler-rhel9@sha256:e5f154ac40919f46f1d46902cb701ee7fa9c611f54dcc923f2098c33c47d2238
    - name: RELATED_IMAGE_ODH_LLM_D_KV_CACHE_IMAGE
      value: registry.redhat.io/rhoai/odh-llm-d-kv-cache-rhel9@sha256:cdf0f45fd7bbbd4adbb4a626962211d48de3c9f5c7544f500167060c5e73936c
    - name: RELATED_IMAGE_ODH_LLM_D_ROUTING_SIDECAR_IMAGE
      value: registry.redhat.io/rhoai/odh-llm-d-routing-sidecar-rhel9@sha256:dcbcbcc5051dcabda5b207175b2cf64f3ef133f4c7de8204103e975dfde37351
    - name: RELATED_IMAGE_OSE_KUBE_RBAC_PROXY_IMAGE
      value: registry.redhat.io/rhoai/odh-kube-auth-proxy-rhel9@sha256:f118fd73be911e899d5aff76b4ca599d10c73e4cc4bf803204734e7f6aeb44c2

# Components configuration
components:
  kserve:
    # Create Kserve CR via post-install hook
    enabled: true
    spec: {}

# Azure cloud configuration
azure:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: registry.redhat.io/rhoai/odh-rhel9-operator@sha256:67d8ad67bef9ce7d06f66a0a3fc054052962f1e59c96629ecadc6790f319f1d1
    # Image pull policy
    imagePullPolicy: Always
  kubernetesEngine:
    # Create AzureKubernetesEngine CR via post-install hook
    enabled: true
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# CoreWeave cloud configuration
coreweave:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: registry.redhat.io/rhoai/odh-rhel9-operator@sha256:67d8ad67bef9ce7d06f66a0a3fc054052962f1e59c96629ecadc6790f319f1d1
    # Image pull policy
    imagePullPolicy: Always
  kubernetesEngine:
    # Create CoreWeaveKubernetesEngine CR via post-install hook
    enabled: true
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# Pull secret for private registries
# Use --set-file imagePullSecret.dockerConfigJson=path/to/auth.json
imagePullSecret:
  # Name of the pull secret to create in target namespaces. This name MUST not be changed
  # as it is referred also in other installed dependencies and not yet configurable.
  name: rhaii-pull-secret
  # Docker config JSON content (populated via --set-file)
  dockerConfigJson: ""
  # Namespaces created by dependency operators where pull secrets should be injected
  dependencyNamespaces:
    - cert-manager-operator
    - cert-manager
    - openshift-lws-operator
    - istio-system
