# helmtemplate-generator configuration for RHAI operator chart

filter:
  include:
    - kinds:
        - CustomResourceDefinition
      names:
        - "kserves.components.platform.opendatahub.io"

rules:
  # Replace namespace references with Helm template
  - match:
      excludeKinds:
        - CustomResourceDefinition
        - Namespace
        - ClusterRole
        - ClusterRoleBinding
    changes:
      - path: .metadata.namespace
        value: '{{ .Values.rhaiOperator.namespace }}'

  # Replace Namespace resource name
  - match:
      kinds:
        - Namespace
      names:
        - 'redhat-ods-operator'
        - 'cloudmanager-operator-system'
    changes:
      - path: .metadata.name
        value: '{{ .Values.rhaiOperator.namespace }}'
      - action: delete
        path: .metadata.labels

  - match:
      kinds:
        - Namespace
      names:
        - 'redhat-ods-applications'
        - 'opendatahub'
    changes:
      - path: .metadata.name
        value: '{{ .Values.rhaiOperator.applicationsNamespace }}'

  # Replace namespace in RoleBinding/ClusterRoleBinding subjects
  - match:
      kinds:
        - RoleBinding
        - ClusterRoleBinding
    changes:
      - path: .subjects[0].namespace
        value: '{{ .Values.rhaiOperator.namespace }}'

  # Replace namespace in webhook service references
  - match:
      kinds:
        - ValidatingWebhookConfiguration
        - MutatingWebhookConfiguration
    changes:
      - path: .webhooks[*].clientConfig.service.namespace
        value: '{{ .Values.rhaiOperator.namespace }}'

  # Wrap CRDs with installCRDs condition
  - match:
      kinds:
        - CustomResourceDefinition
    wrap:
      before: '{{- if .Values.installCRDs }}'
      after: '{{- end }}'

  # Wrap non-CRD resources with enabled condition
  - match:
    wrap:
      before: '{{- if .Values.enabled }}'
      after: '{{- end }}'

  - match:
      kinds:
        - Deployment
    changes:
      # Replace RHAI_APPLICATIONS_NAMESPACE with templated value
      - path: .spec.template.spec.containers[name=rhods-operator].env[name=RHAI_APPLICATIONS_NAMESPACE].value
        value: '{{ .Values.rhaiOperator.applicationsNamespace | quote }}'
      - path: .spec.template.spec.containers[name=rhods-operator].env[name=RHAI_VERSION].value
        value: '{{ .Chart.AppVersion | quote }}'
      # Add related images env vars
      - path: .spec.template.spec.containers[name=rhods-operator].env
        appendWith: |
          {{- range $item := .Values.rhaiOperator.relatedImages }}
          - name: {{ $item.name | quote }}
            value: {{ $item.value | quote }}
          {{- end }}
      # Replace manager container image with Helm template value
      - path: .spec.template.spec.containers[name=rhods-operator].image
        value: '{{ .Values.rhaiOperator.image }}'
      - path: .spec.template.spec.containers[name=rhods-operator].imagePullPolicy
        value: '{{ .Values.rhaiOperator.imagePullPolicy }}'
      # Update OPERATOR_NAME env var value
      - path: .spec.template.spec.containers[name=rhods-operator].env[name=OPERATOR_NAME].value
        value: rhai-operator
      # Rename container from rhods-operator to rhai-operator (must be last)
      - path: .spec.template.spec.containers[name=rhods-operator].name
        value: rhai-operator
      # Rename deployment metadata and labels
      - path: .metadata.name
        value: rhai-operator
      - path: .metadata.labels.name
        value: rhai-operator
      - path: .spec.selector.matchLabels.name
        value: rhai-operator
      - path: .spec.template.metadata.labels.name
        value: rhai-operator
      - path: .spec.template.metadata.annotations["kubectl.kubernetes.io/default-container"]
        value: rhai-operator
      # Update podAntiAffinity label selector
      - path: .spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchExpressions[0].values[0]
        value: rhai-operator
      # Update serviceAccountName reference
      - path: .spec.template.spec.serviceAccountName
        value: rhai-operator-controller-manager
      # Rename webhook cert secret in volume (rhods-operator to rhai-operator)
      - path: .spec.template.spec.volumes[name=cert].secret.secretName
        value: rhai-operator-controller-webhook-cert
      - path: .spec.template.spec.initContainers[name=copy-manifests].image
        value: '{{ .Values.rhaiOperator.image }}'

  # Rename ServiceAccount
  - match:
      kinds:
        - ServiceAccount
      names:
        - "redhat-ods-operator-controller-manager"
    changes:
      - path: .metadata.name
        value: rhai-operator-controller-manager

  # Rename ClusterRoles
  - match:
      kinds:
        - ClusterRole
      names:
        - "rhods-operator-role"
    changes:
      - path: .metadata.name
        value: rhai-operator-role

  - match:
      kinds:
        - ClusterRole
      names:
        - "redhat-ods-operator-metrics-reader"
    changes:
      - path: .metadata.name
        value: rhai-operator-metrics-reader

  # Rename ClusterRoleBinding and update references
  - match:
      kinds:
        - ClusterRoleBinding
      names:
        - "rhods-operator-rolebinding"
    changes:
      - path: .metadata.name
        value: rhai-operator-rolebinding
      - path: .subjects[0].name
        value: rhai-operator-controller-manager
      - path: .roleRef.name
        value: rhai-operator-role

  # Rename Service and update selector
  - match:
      kinds:
        - Service
      names:
        - "redhat-ods-operator-controller-manager-metrics-service"
    changes:
      - path: .metadata.name
        value: rhai-operator-controller-manager-metrics-service
      - path: .spec.selector.name
        value: rhai-operator

  # Update Webhook Service labels and selector
  - match:
      kinds:
        - Service
      names:
        - "rhai-operator-webhook-service"
    changes:
      - path: .metadata.labels["app.kubernetes.io/created-by"]
        value: rhai-operator
      - path: .metadata.labels["app.kubernetes.io/instance"]
        value: rhai-operator
      - path: .metadata.labels["app.kubernetes.io/name"]
        value: rhai-operator-webhook-service
      - path: .metadata.labels["app.kubernetes.io/part-of"]
        value: rhai-operator
      - path: .spec.selector.name
        value: rhai-operator

  # Update MutatingWebhookConfiguration cert annotation
  - match:
      kinds:
        - MutatingWebhookConfiguration
      names:
        - "rhai-operator-mutating-webhook-configuration"
    changes:
      - path: .metadata.annotations["cert-manager.io/inject-ca-from"]
        value: '{{ .Values.rhaiOperator.namespace }}/rhai-operator-webhook-cert'

  # Add image pull secrets to ServiceAccount
  - match:
      kinds:
        - ServiceAccount
    changes:
      - path: .
        appendWith: |
          {{ include "rhai-on-xks-chart.imagePullSecrets" . }}

  - match:
      kinds:
        - CustomResourceDefinition
    changes:
      - path: .metadata.annotations["helm.sh/resource-policy"]
        value: keep

output:
  splitByDocument: true
  directoryRules:
    - match:
        kinds:
          - CustomResourceDefinition
      directory: crds
    - match:
        kinds:
          - Role
          - RoleBinding
          - ClusterRole
          - ClusterRoleBinding
          - ServiceAccount
      directory: rbac
    - match:
        kinds:
          - Deployment
          - Namespace
      directory: manager
    - match:
        kinds:
          - ValidatingWebhookConfiguration
          - MutatingWebhookConfiguration
      directory: webhooks
    - match:
        kinds:
          - Service
        names:
          - '*webhook*'
      directory: webhooks
    - match:
        kinds:
          - Service
      directory: manager
