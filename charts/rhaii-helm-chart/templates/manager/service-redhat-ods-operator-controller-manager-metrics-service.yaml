{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  labels:
    name: rhods-operator
  name: rhaii-operator-controller-manager-metrics-service
  namespace: {{ .Values.rhaiOperator.namespace }}
spec:
  ports:
    - name: http
      port: 8443
      protocol: TCP
      targetPort: http
  selector:
    name: rhaii-operator
{{- end }}
