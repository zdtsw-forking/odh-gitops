{{- if .Values.azure.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: controller-manager
    name: azure-cloud-manager-operator
  name: azure-cloud-manager-operator
  namespace: {{ .Values.azure.cloudManager.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      name: azure-cloud-manager-operator
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        name: azure-cloud-manager-operator
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: name
                      operator: In
                      values:
                        - azure-cloud-manager-operator
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - args:
            - azure
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0.0.0.0:8080
            - --leader-elect
          command:
            - /cloudmanager
          env:
            - name: RHAI_OPERATOR_NAMESPACE
              value: {{ .Values.rhaiOperator.namespace }}
            - name: RHAI_WEBHOOK_CERT_SECRET_NAME
              value: rhai-operator-controller-webhook-cert
            - name: RHAI_WEBHOOK_SERVICE_NAME
              value: rhai-operator-webhook-service
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DEFAULT_CHARTS_PATH
              value: /opt/charts
          image: {{ .Values.azure.cloudManager.image }}
          imagePullPolicy: {{ .Values.azure.cloudManager.imagePullPolicy }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 4Gi
            requests:
              cpu: 100m
              memory: 780Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: azure-cloud-manager-operator
      terminationGracePeriodSeconds: 10
{{- end }}
