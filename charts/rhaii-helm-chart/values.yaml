# yaml-language-server: $schema=values.schema.json
# @schema title: RHAII Helm Chart Values
# @schema description: Configuration values for the RHAII Helm chart

# -- Enable/disable all resource creation
enabled: true # @schema default: true

# -- Install CRDs or not using the chart
installCRDs: true # @schema default: true

# -- Common labels applied to all resources
labels: {}

# -- RHAI Operator configuration
rhaiOperator: # @schema additionalProperties:false
  # -- Operator namespace
  namespace: redhat-ods-operator
  # -- Applications namespace
  applicationsNamespace: redhat-ods-applications
  # -- Manager container image
  image: quay.io/opendatahub/opendatahub-operator:latest
  # -- Image pull policy
  imagePullPolicy: Always # @schema; enum:[Always, IfNotPresent, Never]
  # -- Related images env vars (RELATED_IMAGE_*)
  relatedImages: {}
  # Example:
  # relatedImages:
  #   RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE: quay.io/opendatahub/kserve-controller:latest

# -- Components configuration
components: # @schema additionalProperties:false
  # -- KServe component
  kserve: # @schema additionalProperties:false
    # -- Create Kserve CR via post-install hook
    enabled: true # @schema default: true
    # -- Kserve CR spec
    spec: {}

# -- Azure cloud configuration
azure: # @schema additionalProperties:false
  # -- Enable Azure cloud support
  enabled: false # @schema default: false
  # -- Azure Cloud Manager configuration
  cloudManager: # @schema additionalProperties:false
    # -- Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # -- Cloud Manager container image
    image: quay.io/opendatahub/opendatahub-operator:latest
    # -- Image pull policy
    imagePullPolicy: Always # @schema; enum:[Always, IfNotPresent, Never]
  # -- Azure Kubernetes Engine configuration
  kubernetesEngine: # @schema additionalProperties:false
    # -- Create AzureKubernetesEngine CR via post-install hook
    enabled: true # @schema default: true
    # -- AzureKubernetesEngine CR spec
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# -- CoreWeave cloud configuration
coreweave: # @schema additionalProperties:false
  # -- Enable CoreWeave cloud support
  enabled: false # @schema default: false
  # -- CoreWeave Cloud Manager configuration
  cloudManager: # @schema additionalProperties:false
    # -- Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # -- Cloud Manager container image
    image: quay.io/opendatahub/opendatahub-operator:latest
    # -- Image pull policy
    imagePullPolicy: Always # @schema; enum:[Always, IfNotPresent, Never]
  # -- CoreWeave Kubernetes Engine configuration
  kubernetesEngine: # @schema additionalProperties:false
    # -- Create CoreWeaveKubernetesEngine CR via post-install hook
    enabled: true # @schema default: true
    # -- CoreWeaveKubernetesEngine CR spec
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# -- Pull secret for private registries
# Use --set-file imagePullSecret.dockerConfigJson=path/to/auth.json
imagePullSecret: # @schema additionalProperties:false
  # -- Name of the pull secret to create in target namespaces. This name MUST not be changed
  # as it is referred also in other installed dependencies and not yet configurable.
  name: rhaii-pull-secret
  # -- Docker config JSON content (populated via --set-file)
  dockerConfigJson: ""
  # -- Namespaces created by dependency operators where pull secrets should be injected
  dependencyNamespaces:
    - cert-manager-operator
    - cert-manager
    - openshift-lws-operator
    - istio-system
