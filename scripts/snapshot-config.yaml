# Snapshot configuration for all Helm charts
# Each chart defines its snapshots with optional --set flags
#
# Usage:
#   make chart-snapshots                    # Generate all snapshots
#   make chart-snapshots CHART_NAME=<name>  # Generate for specific chart
#   make chart-test                         # Test all snapshots
#   make chart-test CHART_NAME=<name>       # Test specific chart

charts:
  rhai-on-openshift-chart:
    # Optional: additional values file for testing (relative to chart path)
    testValuesFile: test/testValues.yaml
    snapshots:
      - name: default
        # No additional flags for default

      - name: skip-crd-check-odh
        setFlags:
          - skipCrdCheck=true
          - operator.type=odh

      - name: skip-crd-check-rhoai
        setFlags:
          - skipCrdCheck=true
          - operator.type=rhoai

      - name: all-components-managed
        valuesFiles:
          - docs/examples/values-all-components-managed.yaml
        setFlags:
          - skipCrdCheck=true

      - name: install-with-helm-dependencies
        setFlags:
          - skipCrdCheck=true
          - tags.install-with-helm-dependencies=true

      - name: inference-only
        valuesFiles:
          - docs/examples/values-inference-only.yaml
        setFlags:
          - skipCrdCheck=true

      - name: enable-llm-d-wva
        setFlags:
          - skipCrdCheck=true
          - components.kserve.dsc.managementState=Managed
          - components.kserve.dsc.wva.managementState=Managed
          - components.kserve.dependencies.customMetricsAutoscaler=true


  dependencies/cert-manager-operator:
    snapshots:
      - name: default

  dependencies/gateway-api:
    snapshots:
      - name: default

  dependencies/lws-operator:
    snapshots:
      - name: default

  dependencies/sail-operator:
    snapshots:
      - name: default

  rhai-on-xks-chart:
    snapshots:
      - name: azure-with-related-images
        setFlags:
          - azure.enabled=true
          - rhaiOperator.relatedImages[0].name=RELATED_IMAGE_ODH_KSERVE_LLMISVC_CONTROLLER_IMAGE
          - rhaiOperator.relatedImages[0].value=ghcr.io/opendatahub-io/kserve/odh-kserve-llmisvc-controller:release-v0.17

      - name: with-custom-namespace
        setFlags:
          - azure.enabled=true
          - rhaiOperator.namespace=rhai-operator
          - rhaiOperator.applicationsNamespace=rhai-applications

      - name: coreweave
        setFlags:
          - coreweave.enabled=true

      - name: azure-with-pull-secret
        setFlags:
          - azure.enabled=true
          - imagePullSecret.dockerConfigJson=testauth

      - name: coreweave-with-pull-secret
        setFlags:
          - coreweave.enabled=true
          - imagePullSecret.dockerConfigJson=testauth

